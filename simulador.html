<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart.Bonus - Simulador de Incentivo 2026</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <div class="logo">
                <span class="smart">smart</span><span class="bonus">.bonus</span>
            </div>
            <div class="subtitle">Programa de Incentivo de Longo Prazo 2026</div>

        </header>

            <div class="inputs-grid">

                <div class="input-card">
                    <label class="input-label">Entrada de Dados</label>
                    <h3 class="input-title">Remuneração Mensal</h3>
                    <input type="text" id="salario" class="input-field" placeholder="R$ 0,00" value="R$ 2.000,00">
                </div>

                <div class="input-card">
                    <label class="input-label">Classificação</label>
                    <h3 class="input-title">Grade</h3>
                    <select id="grade" class="input-field">
                        <option value="Grade I">Grade I</option>
                        <option value="Grade II">Grade II</option>
                        <option value="Grade III">Grade III</option>
                    </select>
                </div>

                <div class="input-card" id="metasCard">
                    <label class="input-label">Fator SMART.METAS</label>
                    <h3 class="input-title">Projeção de Atingimento</h3>
                    <div class="slider-container">
                        <div class="slider-value">
                            <span class="slider-value-text" id="metasValue">100%</span>
                        </div>
                        <input type="range" id="metas" min="0" max="100" value="100" step="1">
                        
                    </div>
                </div>

                <div class="input-card" id="tempoCard">
                    <label class="input-label">Fator SMART.TEMPO</label>
                    <h3 class="input-title">Meses Completos até 2026</h3>
                    <div class="slider-container">
                        <div class="slider-value">
                            <span class="slider-value-text" id="tempoValue">12</span>
                        </div>
                        <input type="range" id="tempo" min="1" max="12" value="12" step="1">
                        
                    </div>
                </div>

            </div>

            <div class="results-section">
                <h2 class="results-title">Simulação de Cenários</h2>

                <div class="table-container">
                    <table id="resultsTable">
                        <thead>
                            <tr>
                                <th>Remuneração Mensal</th>
                                <th>SMART.METAS</th>
                                <th>SMART.TEMPO</th>
                                <th>SMART.IMPACTO</th>
                                <th>Faixa</th>
                                <th>1º Semestre</th>
                                <th>2º Semestre</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody">
                            
                        </tbody>
                    </table>
                </div>

            </div>
            </div>

    <script>

        const salarioInput     = document.getElementById('salario');
        const gradeSelect      = document.getElementById('grade');
        const metasSlider      = document.getElementById('metas');
        const tempoSlider      = document.getElementById('tempo');
        const metasValueEl     = document.getElementById('metasValue');
        const tempoValue       = document.getElementById('tempoValue');
        const resultsBody      = document.getElementById('resultsBody');
        const metasCard        = document.getElementById('metasCard');
        const tempoCard        = document.getElementById('tempoCard');

        const METAS_MINIMO = 70; 
        const TEMPO_MINIMO = 3;  

        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value);
        }

        function parseCurrency(value) {
            return parseFloat(value.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
        }

        salarioInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            value = (parseInt(value) / 100).toFixed(2);
            e.target.value = formatCurrency(value);
            calculate();
        });

        salarioInput.addEventListener('blur', function(e) {
            let value = parseCurrency(e.target.value);
            e.target.value = formatCurrency(value);
        });

        metasSlider.addEventListener('input', function(e) {
            const value = parseInt(e.target.value);
            metasValueEl.textContent = value + '%';

            e.target.style.setProperty('--value', value + '%');

            const isBelowMin = value < METAS_MINIMO;
            metasValueEl.classList.toggle('warning', isBelowMin);    
            metasCard.classList.toggle('warning-card', isBelowMin);  
    
            e.target.classList.toggle('warning-slider', isBelowMin); 

            calculate();
        });

        tempoSlider.addEventListener('input', function(e) {
            const value = parseInt(e.target.value);
            tempoValue.textContent = value;

            e.target.style.setProperty('--value', (value / 12 * 100) + '%');

            const isBelowMin = value < TEMPO_MINIMO;
            tempoValue.classList.toggle('warning', isBelowMin);
            tempoCard.classList.toggle('warning-card', isBelowMin);

            e.target.classList.toggle('warning-slider', isBelowMin);

            calculate();
        });

        gradeSelect.addEventListener('change', calculate);

        function getSemestralMult(grade, faixaNum, impacto) {
            const tabela = {
                'Grade I': {
                    1: { sem: { sem1: 0.4, sem2: 0.6 }, com: { sem1: 0.4, sem2: 2.6 } },
                    2: { sem: { sem1: 0.8, sem2: 1.2 }, com: { sem1: 0.8, sem2: 3.2 } },
                    3: { sem: { sem1: 1.4, sem2: 1.6 }, com: { sem1: 1.4, sem2: 3.6 } }
                },
                'Grade II': {
                    1: { sem: { sem1: 0.5, sem2: 1.0 }, com: { sem1: 0.5, sem2: 3.0 } },
                    2: { sem: { sem1: 1.2, sem2: 1.8 }, com: { sem1: 1.2, sem2: 3.8 } },
                    3: { sem: { sem1: 2.0, sem2: 2.5 }, com: { sem1: 2.0, sem2: 4.5 } }
                },
                'Grade III': {
                    1: { sem: { sem1: 0.7, sem2: 1.3 }, com: { sem1: 0.7, sem2: 3.3 } },
                    2: { sem: { sem1: 1.6, sem2: 2.4 }, com: { sem1: 1.6, sem2: 4.4 } },
                    3: { sem: { sem1: 2.7, sem2: 3.3 }, com: { sem1: 2.7, sem2: 5.3 } }
                }
            };
            const gradeData = tabela[grade];
            if (!gradeData || !gradeData[faixaNum]) return { sem1: 0, sem2: 0 };
            return impacto === 'Sim' ? gradeData[faixaNum].com : gradeData[faixaNum].sem;
        }

        function getFaixaNome(faixaNum) {
            const nomes = {
                1: 'Faixa 1 (>= 15MM e <20MM)',
                2: 'Faixa 2 (>=20MM e <25MM)',
                3: 'Faixa 3 (>=25MM)'
            };
            return nomes[faixaNum] || '';
        }

        function calculatePremio(salario, grade, metas, tempo, impacto, faixaNum) {
            if (metas < METAS_MINIMO) return { total: 0, sem1: 0, sem2: 0 };
            if (tempo < TEMPO_MINIMO) return { total: 0, sem1: 0, sem2: 0 };

            const tempoMap = {
                1: 0, 2: 0,
                3: 3/12, 4: 4/12, 5: 5/12, 6: 6/12,
                7: 7/12, 8: 8/12, 9: 9/12, 10: 10/12,
                11: 11/12, 12: 12/12
            };
            const tempoFrac = tempoMap[tempo] ?? 0;
            const metasFrac = metas / 100;

            const mult = getSemestralMult(grade, faixaNum, impacto);
            const base = salario * metasFrac * tempoFrac;

            return {
                total: base * (mult.sem1 + mult.sem2),
                sem1:  base * mult.sem1,
                sem2:  base * mult.sem2
            };
        }

        function calculate() {
            const salario = parseCurrency(salarioInput.value);
            const grade   = gradeSelect.value;
            const metas   = parseInt(metasSlider.value);
            const tempo   = parseInt(tempoSlider.value);

            metasSlider.style.setProperty('--value', metas + '%');
            tempoSlider.style.setProperty('--value', (tempo / 12 * 100) + '%');

            const isZeroed = metas < METAS_MINIMO || tempo < TEMPO_MINIMO;

            const cenarios = [];
            [1, 2, 3].forEach(faixaNum => {
                ['Não', 'Sim'].forEach(impacto => {
                    const result = calculatePremio(salario, grade, metas, tempo, impacto, faixaNum);
                    cenarios.push({
                        faixaNum,
                        impacto,
                        premio: result.total,
                        sem1:   result.sem1,
                        sem2:   result.sem2
                    });
                });
            });

            resultsBody.innerHTML = cenarios.map(c => {
                const badgeClass  = c.impacto === 'Sim' ? 'badge-sim' : 'badge-nao';
                const currZeroed  = isZeroed ? ' zeroed' : '';

                return `
                    <tr>
                        <td data-label="Remuneração" class="value">${formatCurrency(salario)}</td>
                        <td data-label="SMART.METAS">${metas}%</td>
                        <td data-label="SMART.TEMPO">${tempo} ${tempo === 1 ? 'mês' : 'meses'}</td>
                        <td data-label="SMART.IMPACTO"><span class="badge ${badgeClass}">${c.impacto}</span></td>
                        <td data-label="Faixa">${getFaixaNome(c.faixaNum)}</td>
                        <td data-label="1º Semestre" class="currency${currZeroed}">${formatCurrency(c.sem1)}</td>
                        <td data-label="2º Semestre" class="currency${currZeroed}">${formatCurrency(c.sem2)}</td>
                    </tr>`;
            }).join('');
        }

        calculate();

    </script>
</body>
</html>
